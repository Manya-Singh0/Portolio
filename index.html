<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manya Singh | AI Cyberpunk System</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#030303;
color:white;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
cursor:none;
}

/* GRID */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,255,0.05) 1px, transparent 1px);
background-size:50px 50px;
z-index:-2;
}

/* PARALLAX */
.parallax{
transform-style:preserve-3d;
transition:transform 0.1s;
}

/* CURSOR */
.cursor{
width:12px;height:12px;
border:2px solid #00f7ff;
border-radius:50%;
position:fixed;
pointer-events:none;
z-index:9999;
box-shadow:0 0 15px #00f7ff;
}

/* NAV */
nav{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
z-index:1000;
}

nav li{
margin:20px 0;
cursor:pointer;
transition:0.3s;
}

nav li:hover{
color:#ff00ff;
text-shadow:0 0 10px #ff00ff;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.hero h1{
font-size:4rem;
text-shadow:0 0 25px #00f7ff;
}

/* BUTTONS */
.btn{
padding:12px 25px;
margin:10px;
border:1px solid #00f7ff;
background:none;
color:#00f7ff;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
background:#00f7ff;
color:black;
}

/* GLASS */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(0,255,255,0.2);
padding:30px;
margin:30px;
}

/* AI PANEL */
.ai-box{
position:fixed;
bottom:20px;
right:20px;
width:250px;
background:#000;
border:1px solid #00f7ff;
padding:15px;
}

.ai-box input{
width:100%;
padding:8px;
background:black;
border:1px solid #00f7ff;
color:white;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav>
<ul>
<li onclick="go('home')">HOME</li>
<li onclick="go('profile')">PROFILE</li>
<li onclick="go('contact')">CONTACT</li>
</ul>
</nav>

<!-- HERO -->
<section class="hero parallax" id="home">
<h1>MANYA SINGH</h1>
<p id="typing"></p>

<button class="btn">ENTER SYSTEM</button>
<button class="btn">CONTACT</button>
</section>

<!-- PROFILE -->
<section id="profile">
<div class="card">
<h2>PROFILE</h2>
<p>CS student exploring data, AI & interactive systems.</p>
</div>
</section>

<!-- AI ASSISTANT -->
<div class="ai-box">
<p>AI Assistant</p>
<input placeholder="Ask something..." onkeydown="reply(event)">
<div id="ai-response"></div>
</div>

<script>

/* typing */
const text="Initializing system...";
let i=0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}}
type();

/* cursor */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* parallax */
document.addEventListener("mousemove",(e)=>{
let x=(window.innerWidth/2 - e.clientX)/50;
let y=(window.innerHeight/2 - e.clientY)/50;
document.querySelectorAll(".parallax").forEach(el=>{
el.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});
});

/* scroll */
function go(id){
document.getElementById(id).scrollIntoView();
}

/* fake AI */
function reply(e){
if(e.key==="Enter"){
let val=e.target.value.toLowerCase();
let res="System ready.";
if(val.includes("skills")) res="You have strong data & dev skills.";
if(val.includes("project")) res="Check missions section.";
document.getElementById("ai-response").innerText=res;
e.target.value="";
}
}

</script>

</body>
</html>
